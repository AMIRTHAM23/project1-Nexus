<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login & Signup</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="full-page">

    <!-- NAVBAR -->
    <div class="navbar">
        <div>
            <a href="#">Login and Registration</a>
        </div>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Contact</a></li>
                <li>
                    <button class="loginbtn"
                        onclick="document.getElementById('login-form').style.display='flex'">
                        Login
                    </button>
                </li>
            </ul>
        </nav>
    </div>

    <!-- LOGIN FORM -->
    <div id="login-form" class="login-page">
        <div class="form-box">

            <div class="button-box">
                <div id="btn"></div>
                <button type="button" onclick="login()" class="toggle-btn">Log In</button>
                <button type="button" onclick="register()" class="toggle-btn">Register</button>
            </div>

            <!-- LOGIN -->
            <form id="login" class="input-group-login">
                <input type="text" class="input-field" placeholder="Username" required>
                <input type="password" class="input-field" placeholder="Enter Password" required>
                <input type="checkbox" class="checkbox"><span>Remember Password</span>
                <button type="submit" class="submit-btn">Log In</button>
            </form>

            <!-- REGISTER -->
            <form id="register" class="input-group-register">
                <input type="text" class="input-field" placeholder="First Name" required>
                <input type="text" class="input-field" placeholder="Last Name" required>
                <input type="email" class="input-field" placeholder="Email Id" required>
                <input type="password" class="input-field" placeholder="Enter Password" required>
                <input type="password" class="input-field" placeholder="Confirm Password" required>
                <input type="checkbox" class="checkbox"><span>I agree to the terms</span>
                <button type="submit" class="submit-btn">Register</button>
            </form>

        </div>
    </div>

</div>

<!-- SCRIPT -->
<script>
let x = document.getElementById('login');
let y = document.getElementById('register');
let z = document.getElementById('btn');

function register(){
    x.style.left = "-400px";
    y.style.left = "50px";
    z.style.left = "110px";
}

function login(){
    x.style.left = "50px";
    y.style.left = "450px";
    z.style.left = "0px";
}

// Close modal on outside click
let modal = document.getElementById('login-form');
window.onclick = function(event){
    if(event.target == modal){
        modal.style.display = "none";
    }
}
</script>

</body>
</html>
